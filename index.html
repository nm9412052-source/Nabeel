<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="background-grid" aria-hidden="true"></div>

  <main class="app">

    <header class="header">
      <h1 class="logo">
        <span class="logo-x">X</span>
        <span class="logo-sep">·</span>
        <span class="logo-o">O</span>
      </h1>
      <p class="tagline">Tic-Tac-Toe</p>
    </header>

    <!-- Mode Selection -->
    <section class="mode-select" id="modeSelect">
      <h2 class="section-title">Choose Mode</h2>
      <div class="mode-cards">
        <button class="mode-card" id="btnTwoPlayer">
          <span class="mode-icon">👥</span>
          <span class="mode-name">2 Players</span>
          <span class="mode-desc">Play with a friend</span>
        </button>
        <button class="mode-card" id="btnVsAI">
          <span class="mode-icon">🤖</span>
          <span class="mode-name">vs AI</span>
          <span class="mode-desc">Challenge the computer</span>
        </button>
      </div>
    </section>

    <!-- Difficulty (shown only for vs AI) -->
    <section class="difficulty-select hidden" id="difficultySelect">
      <h2 class="section-title">AI Difficulty</h2>
      <div class="difficulty-btns">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn active" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
    </section>

    <!-- Game Arena -->
    <section class="game-arena hidden" id="gameArena">

      <!-- Score Bar -->
      <div class="scoreboard">
        <div class="score-block" id="scoreX">
          <span class="score-label">X</span>
          <span class="score-value" id="scoreXVal">0</span>
          <span class="score-name" id="nameX">Player 1</span>
        </div>
        <div class="score-block draws">
          <span class="score-label">Draws</span>
          <span class="score-value" id="scoreDrawVal">0</span>
        </div>
        <div class="score-block" id="scoreO">
          <span class="score-label">O</span>
          <span class="score-value" id="scoreOVal">0</span>
          <span class="score-name" id="nameO">Player 2</span>
        </div>
      </div>

      <!-- Turn Indicator -->
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-dot" id="turnDot"></span>
        <span id="turnText">Player 1's turn (X)</span>
      </div>

      <!-- Board -->
      <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </div>

      <!-- Action Buttons -->
      <div class="action-btns">
        <button class="btn btn-secondary" id="btnNewRound">New Round</button>
        <button class="btn btn-ghost" id="btnChangeMode">Change Mode</button>
      </div>

    </section>

    <!-- Result Modal -->
    <div class="modal-backdrop hidden" id="modalBackdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-symbol" id="modalSymbol"></div>
        <h2 class="modal-title" id="modalTitle">Game Over</h2>
        <p class="modal-sub" id="modalSub"></p>
        <div class="modal-btns">
          <button class="btn btn-primary" id="btnPlayAgain">Play Again</button>
          <button class="btn btn-ghost" id="btnModalChangeMode">Change Mode</button>
        </div>
      </div>
    </div>

  </main>

  <script src="js/game.js"></script>
</body>
</html>
